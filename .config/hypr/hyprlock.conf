source = ~/.config/matugen/hyprlock-colors.conf

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = $primary
    inner_color = $surface
    font_color = $on_surface
    check_color = $secondary
    fail_color = $error
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $on_surface
    font_size = 55
    font_family = RedHatDisplay
    position = 0, 80
    halign = center
    valign = center
}
